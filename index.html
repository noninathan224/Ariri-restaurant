<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariri Restaurant & Bar | Nigerian Kitchen - Leicester</title>
<meta name="description" content="Authentic Nigerian restaurant and bar at 29 Church Gate Street, Leicester. Order online, dine in, or book bulk catering for events across the UK.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#C4581A;--acc2:#D4952A;--bg:#0B0A08;--txt:#E8DDD0;--cream:#F5F0EB}
html{scroll-behavior:smooth}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden}
button,input,textarea,select{font-family:"DM Sans",sans-serif}

/* ---- ANIMATIONS ---- */
@keyframes wordReveal{from{opacity:0;transform:translateY(110%);filter:blur(5px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes floatPlate{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-20px) rotate(2deg)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.wr{display:inline-block;overflow:hidden;vertical-align:bottom;margin-right:.22em}
.wri{display:inline-block;animation:wordReveal .72s cubic-bezier(.16,1,.3,1) both}
.afu{animation:fadeUp .85s cubic-bezier(.16,1,.3,1) both}
.asi{animation:scaleIn 1.1s cubic-bezier(.16,1,.3,1) both}
.afl{animation:floatPlate 4.5s ease-in-out infinite}
.aslide{animation:slideIn .3s ease both}
.apop{animation:popIn .35s cubic-bezier(.16,1,.3,1) both}

/* ---- SHARED NAV (order/owner pages) ---- */
.anav{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid rgba(232,221,208,.07);position:sticky;top:0;background:var(--bg);z-index:100}
.abrand{font-size:19px;font-weight:600;letter-spacing:-.04em;color:var(--txt);cursor:pointer;background:none;border:none;font-family:"DM Sans",sans-serif}
.abrand em{color:var(--acc2);font-style:normal}
.anav-r{display:flex;gap:8px;align-items:center}
.bo2{background:transparent;color:rgba(232,221,208,.55);border:1px solid rgba(232,221,208,.15);padding:8px 16px;border-radius:9px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s;text-transform:uppercase;letter-spacing:.04em}
.bo2:hover{background:rgba(232,221,208,.06)}
.ba{background:var(--acc);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;text-transform:uppercase;letter-spacing:.04em}
.ba:hover{opacity:.85}
.bwa{background:#25D366;color:#fff;border:none;padding:9px 18px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;text-transform:uppercase;letter-spacing:.04em}
.bwa:hover{opacity:.88}
.bcnt{background:var(--acc);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;font-weight:700}

/* ---- LANDING NAV ---- */
.lnav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:clamp(.9rem,2vw,1.35rem) clamp(1.25rem,4vw,2.5rem);background:linear-gradient(to bottom,rgba(11,10,8,.92) 0%,transparent 100%);backdrop-filter:blur(10px)}
.brand{font-size:clamp(1.4rem,3vw,1.85rem);font-weight:500;letter-spacing:-.05em;color:var(--txt);text-decoration:none;background:none;border:none;cursor:pointer;font-family:"DM Sans",sans-serif}
.nav-links{display:flex;gap:clamp(1.25rem,3vw,2rem);align-items:center}
.nl{background:none;border:none;cursor:pointer;color:rgba(232,221,208,.62);font-weight:500;font-size:clamp(.8rem,1.4vw,.95rem);letter-spacing:-.02em;transition:color .15s;text-decoration:none}
.nl:hover{color:var(--txt)}
.nav-r{display:flex;align-items:center;gap:10px}
.btn-c{display:inline-flex;align-items:center;gap:7px;background:var(--txt);color:#0C0C0C;border:none;cursor:pointer;font-weight:500;letter-spacing:-.03em;transition:all .2s;border-radius:8px;padding:9px 20px;font-size:.88rem}
.btn-c:hover{background:#fff;transform:translateY(-1px)}
.btn-h{background:rgba(232,221,208,.08);border:1px solid rgba(232,221,208,.15);color:var(--txt);cursor:pointer;border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-h:hover{background:rgba(232,221,208,.15)}
.mob{position:fixed;inset:0;background:rgba(11,10,8,.97);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.75rem}
.mob.open{display:flex}
.mob-lnk{background:none;border:none;color:var(--txt);font-size:1.85rem;font-weight:400;letter-spacing:-.04em;cursor:pointer;text-decoration:none}
.mob-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:var(--txt);cursor:pointer}

/* ---- HERO ---- */
.hero{position:relative;min-height:100vh;padding:0 clamp(1.25rem,4vw,2.5rem);display:flex;flex-direction:column;overflow:hidden}
.glow{position:absolute;border-radius:50%;pointer-events:none;filter:blur(90px)}
.g1{width:65%;height:75%;top:-20%;right:-15%;background:radial-gradient(ellipse,rgba(196,88,26,.1) 0%,transparent 65%);animation:pulse 6s ease-in-out infinite}
.g2{width:45%;height:45%;bottom:20%;left:-8%;background:radial-gradient(ellipse,rgba(212,149,42,.06) 0%,transparent 70%);animation:pulse 8s ease-in-out infinite .5s}
.hero-inner{position:relative;z-index:5;padding-top:clamp(7rem,14vh,10rem);flex:1}
h1.hl{font-size:clamp(3.5rem,10.5vw,9rem);font-weight:400;letter-spacing:-.055em;line-height:.97;max-width:clamp(300px,70vw,780px);margin-bottom:clamp(2.5rem,5vw,4rem)}
.dim{color:rgba(232,221,208,.28)}.bright{color:var(--txt)}
.cta-row{display:flex;gap:clamp(1rem,3.5vw,3rem);align-items:flex-start;flex-wrap:wrap}
.btn-p{display:inline-flex;align-items:center;gap:8px;background:var(--txt);color:#0C0C0C;border:none;cursor:pointer;font-weight:500;letter-spacing:-.03em;transition:all .2s;border-radius:8px;padding:14px clamp(22px,3vw,38px);font-size:clamp(.88rem,1.5vw,1.05rem)}
.btn-p:hover{background:#fff;transform:translateY(-2px)}
.btn-w{display:inline-flex;align-items:center;gap:7px;background:#25D366;color:#fff;border:none;border-radius:8px;padding:14px clamp(16px,2.5vw,26px);font-size:clamp(.82rem,1.3vw,.95rem);font-weight:500;cursor:pointer;letter-spacing:-.02em;transition:opacity .2s}
.btn-w:hover{opacity:.88}
.hero-sub{color:rgba(232,221,208,.4);max-width:270px;font-size:clamp(.8rem,1.2vw,.88rem);line-height:1.65;letter-spacing:-.02em;padding-top:6px}

.plate-wrap{position:absolute;right:clamp(-5%,2vw,6%);top:50%;transform:translateY(-50%);z-index:3}
.plate-sz{position:relative;width:clamp(220px,34vw,480px);height:clamp(220px,34vw,480px)}
.pr{position:absolute;border-radius:50%;border:1px solid rgba(212,149,42,.15);pointer-events:none}
.pm{position:absolute;inset:0;border-radius:50%;background:#100A04;border:1.5px solid rgba(196,88,26,.3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pi1{position:absolute;inset:12%;border-radius:50%;border:1px solid rgba(212,149,42,.13)}
.pi2{position:absolute;inset:25%;border-radius:50%;border:1px solid rgba(212,149,42,.08);background:rgba(196,88,26,.04)}
.pg{position:absolute;bottom:0;left:0;right:0;height:60%;background:radial-gradient(ellipse at bottom,rgba(196,88,26,.14) 0%,transparent 70%)}
.ptg{position:absolute;top:0;left:0;right:0;height:40%;background:radial-gradient(ellipse at top,rgba(212,149,42,.06) 0%,transparent 70%)}
.pc{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;padding:20%}
.pi-ico{font-size:clamp(2.5rem,6vw,4.5rem);color:rgba(212,149,42,.45);line-height:1}
.pi-lbl{font-size:clamp(.5rem,1vw,.68rem);font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,221,208,.18)}

.bstrip{position:relative;z-index:5;border-top:1px solid rgba(232,221,208,.07);padding:clamp(1.25rem,3vw,2rem) clamp(1.25rem,4vw,2.5rem);display:flex;align-items:center;gap:clamp(1rem,3vw,2.5rem);flex-wrap:wrap;margin-top:auto}
.stn{font-size:clamp(1.1rem,2.8vw,1.8rem);font-weight:400;color:var(--acc2);letter-spacing:-.04em;line-height:1}
.stl{font-size:clamp(.6rem,.95vw,.72rem);color:rgba(232,221,208,.3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.std{width:1px;height:28px;background:rgba(232,221,208,.1);flex-shrink:0}

/* ---- STORY ---- */
.story{background:var(--bg);padding:clamp(4rem,9vw,7rem) clamp(1.25rem,5vw,5rem);display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden}
.sg{position:absolute;width:60%;height:60%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(196,88,26,.06) 0%,transparent 65%);pointer-events:none}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(196,88,26,.12);border-radius:999px;padding:5px 14px;margin-bottom:2rem;font-size:.72rem;font-weight:500;color:var(--acc);letter-spacing:.1em;text-transform:uppercase}
.story-q{font-size:clamp(1.6rem,5vw,3.8rem);font-weight:400;letter-spacing:-.04em;line-height:1.15;max-width:720px;margin-bottom:2rem;color:var(--txt)}
.sdiv{width:40px;height:1px;background:rgba(232,221,208,.2);margin:0 auto 2rem}
.story-body{font-size:clamp(.88rem,1.5vw,1.02rem);color:rgba(232,221,208,.45);max-width:520px;line-height:1.85;letter-spacing:-.02em;margin-bottom:2.5rem}
.story-dets{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center}
.story-det{display:flex;align-items:center;gap:.6rem;font-size:clamp(.75rem,1.2vw,.85rem);color:rgba(232,221,208,.38);letter-spacing:-.01em}
.story-det i{font-size:1rem;color:var(--acc);opacity:.65}

/* ---- DISH ART (illustrated, since no photo generation available) ---- */
.dish-art{position:relative;overflow:hidden;border-radius:inherit;display:flex;align-items:center;justify-content:center}
.dish-blob{position:absolute;border-radius:50%;filter:blur(16px);opacity:.55}
.dish-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 45%)}
.dish-ico{position:relative;z-index:2;opacity:.9}

/* ---- FULL MENU (landing preview) ---- */
.menu-sec{background:var(--cream);padding:clamp(3rem,8vw,6rem) clamp(1.25rem,5vw,4rem)}
.sec-eyebrow{font-size:.72rem;font-weight:500;color:rgba(12,12,12,.38);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.75rem}
.sec-h{font-size:clamp(2rem,6vw,4rem);font-weight:400;color:#0C0C0C;letter-spacing:-.05em;line-height:1;margin-bottom:2.5rem}
.menu-grid-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1px;background:rgba(12,12,12,.08);margin-bottom:1.5rem}
.mcb{background:var(--cream);padding:clamp(1.25rem,2.5vw,1.85rem)}
.mcb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.9rem;border-bottom:1px solid rgba(12,12,12,.1)}
.mcb-name{font-size:clamp(.95rem,1.8vw,1.15rem);font-weight:500;color:#0C0C0C;letter-spacing:-.03em}
.mcb-cnt{font-size:.7rem;color:rgba(12,12,12,.3);letter-spacing:.06em;text-transform:uppercase}
.dr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(12,12,12,.06)}
.dr:last-child{border-bottom:none}
.dn{font-size:clamp(.8rem,1.3vw,.9rem);color:#0C0C0C;letter-spacing:-.02em}
.dp{font-size:.8rem;font-weight:500;color:rgba(12,12,12,.45);white-space:nowrap;margin-left:.75rem}
.dtag{font-size:.62rem;padding:2px 6px;border-radius:999px;margin-left:6px;font-weight:600;vertical-align:middle}
.tpop{background:rgba(26,92,46,.12);color:#1A5C2E}
.tso{background:rgba(196,88,26,.12);color:var(--acc)}
.menu-note{font-size:.82rem;color:rgba(12,12,12,.38);font-style:italic;letter-spacing:-.01em}

/* ---- WHY ---- */
.why-sec{background:var(--bg);padding:clamp(3rem,8vw,6rem) clamp(1.25rem,5vw,4rem)}
.why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:rgba(232,221,208,.06);margin-top:2.5rem}
.wc{background:var(--bg);padding:clamp(1.25rem,2.5vw,2rem)}
.wc-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:1.1rem}
.wc-ico i{font-size:1.2rem}
.wc-h{font-size:clamp(.95rem,1.7vw,1.1rem);font-weight:500;color:var(--txt);letter-spacing:-.03em;margin-bottom:.55rem}
.wc-p{font-size:clamp(.78rem,1.2vw,.85rem);color:rgba(232,221,208,.38);line-height:1.65;letter-spacing:-.01em}

/* ---- BOOKING (landing section) ---- */
.book-sec{background:#0C0C0C;padding:clamp(3rem,8vw,6rem) clamp(1.25rem,5vw,4rem);position:relative;overflow:hidden}
.book-glow{position:absolute;top:-20%;right:-10%;width:55%;height:70%;background:radial-gradient(ellipse,rgba(196,88,26,.08) 0%,transparent 65%);pointer-events:none}
.book-inner{max-width:920px;margin:0 auto;position:relative;z-index:2}
.book-cols{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,4rem);align-items:start;margin-bottom:2.5rem}
.book-h{font-size:clamp(1.8rem,5vw,3.5rem);font-weight:400;color:var(--txt);letter-spacing:-.05em;line-height:1;margin-bottom:1rem}
.book-sub{font-size:clamp(.82rem,1.3vw,.92rem);color:rgba(232,221,208,.42);line-height:1.75;letter-spacing:-.02em;margin-bottom:1.5rem}
.check-item{display:flex;align-items:center;gap:.65rem;padding:8px 0;font-size:.88rem;color:rgba(232,221,208,.45);letter-spacing:-.02em}
.check-item i{color:#5DCE96;font-size:1rem;flex-shrink:0}
.form-card{background:rgba(232,221,208,.03);border:1px solid rgba(232,221,208,.1);border-radius:20px;padding:clamp(1.5rem,3.5vw,2.25rem)}
.fg{margin-bottom:1.35rem}
.fl{display:block;font-size:.68rem;font-weight:500;color:rgba(232,221,208,.38);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem}
.fi-inp{width:100%;padding:11px 14px;border:1px solid rgba(232,221,208,.12);border-radius:10px;font-size:.88rem;color:var(--txt);background:rgba(232,221,208,.04);transition:border-color .2s;letter-spacing:-.02em;appearance:none}
.fi-inp:focus{outline:none;border-color:var(--acc)}
.fi-inp::placeholder{color:rgba(232,221,208,.22)}
textarea.fi-inp{min-height:85px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.evt-pills,.gst-pills{display:flex;flex-wrap:wrap;gap:7px}
.ep{padding:7px 14px;border-radius:999px;border:1px solid rgba(232,221,208,.14);background:transparent;color:rgba(232,221,208,.5);font-size:.8rem;cursor:pointer;transition:all .18s;letter-spacing:-.01em}
.ep:hover{border-color:rgba(232,221,208,.3);color:var(--txt)}
.ep.on{background:rgba(196,88,26,.16);border-color:var(--acc);color:var(--acc)}
.gp{padding:6px 13px;border-radius:999px;border:1px solid rgba(232,221,208,.12);background:transparent;color:rgba(232,221,208,.45);font-size:.78rem;cursor:pointer;transition:all .18s;letter-spacing:-.01em}
.gp:hover{border-color:rgba(232,221,208,.28);color:var(--txt)}
.gp.on{background:rgba(212,149,42,.14);border-color:var(--acc2);color:var(--acc2)}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mci{display:flex;align-items:center;gap:9px;padding:10px 11px;border:1px solid rgba(232,221,208,.1);border-radius:10px;cursor:pointer;transition:all .18s}
.mci:hover{border-color:rgba(232,221,208,.24);background:rgba(232,221,208,.02)}
.mci.on{border-color:var(--acc);background:rgba(196,88,26,.08)}
.mci-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mci-ico i{font-size:.9rem;color:rgba(232,221,208,.65)}
.mci-name{font-size:.78rem;font-weight:500;color:rgba(232,221,208,.65);letter-spacing:-.02em;flex:1;min-width:0}
.mci-p{font-size:.68rem;color:rgba(232,221,208,.25);letter-spacing:-.01em}
.mci-chk{width:16px;height:16px;border-radius:4px;border:1px solid rgba(232,221,208,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.mci.on .mci-chk{background:var(--acc);border-color:var(--acc)}
.mci-chk i{font-size:.68rem;color:#fff;display:none}
.mci.on .mci-chk i{display:block}
.btn-book{width:100%;padding:16px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:500;cursor:pointer;letter-spacing:-.02em;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:1.25rem}
.btn-book:hover{background:#d2601f;transform:translateY(-1px)}
.form-note{text-align:center;font-size:.72rem;color:rgba(232,221,208,.25);margin-top:.65rem;letter-spacing:-.01em}
.form-ok{display:none;text-align:center;padding:3rem 1rem}
.form-ok i{font-size:3rem;color:#5DCE96;display:block;margin-bottom:.9rem}
.form-ok h3{font-size:1.2rem;font-weight:400;color:var(--txt);letter-spacing:-.04em;margin-bottom:.5rem}
.form-ok p{font-size:.85rem;color:rgba(232,221,208,.38);line-height:1.6}

/* ---- FOOTER ---- */
footer{background:#070605;border-top:1px solid rgba(232,221,208,.06);padding:clamp(2.5rem,6vw,4rem) clamp(1.25rem,5vw,4rem)}
.foot-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:2.5rem;max-width:900px;margin:0 auto}
.fbrand{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;color:var(--txt);letter-spacing:-.05em;margin-bottom:.85rem}
.fdesc{font-size:clamp(.76rem,1.2vw,.85rem);color:rgba(232,221,208,.35);line-height:1.7;max-width:250px;margin-bottom:1.5rem;letter-spacing:-.01em}
.fcontacts{display:flex;flex-direction:column;gap:.55rem}
.fc-item{display:flex;align-items:center;gap:.6rem;font-size:.83rem;color:rgba(232,221,208,.4);text-decoration:none;letter-spacing:-.01em;transition:color .15s;background:none;border:none;cursor:pointer}
.fc-item:hover{color:var(--txt)}
.fc-item i{font-size:.95rem;color:var(--acc);opacity:.65;flex-shrink:0}
.foot-col h4{font-size:.68rem;font-weight:500;color:rgba(232,221,208,.28);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.9rem}
.flinks{display:flex;flex-direction:column;gap:.55rem}
.flnk{font-size:.83rem;color:rgba(232,221,208,.4);text-decoration:none;letter-spacing:-.01em;transition:color .15s;background:none;border:none;cursor:pointer;padding:0;text-align:left}
.flnk:hover{color:var(--txt)}
.foot-btm{border-top:1px solid rgba(232,221,208,.05);margin-top:2.5rem;padding-top:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;max-width:900px;margin-left:auto;margin-right:auto}
.fcopy{font-size:.7rem;color:rgba(232,221,208,.22);letter-spacing:-.01em}
.finsta{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;color:rgba(232,221,208,.32);text-decoration:none;transition:color .15s}
.finsta:hover{color:var(--txt)}

/* ================= ORDER APP ================= */
.app-wrap{background:var(--bg);min-height:100vh}
.cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.1rem;padding:1rem 1.5rem 0}
.cb{border:1px solid rgba(232,221,208,.13);background:transparent;padding:5px 13px;border-radius:999px;font-size:12px;cursor:pointer;color:rgba(232,221,208,.55);transition:all .15s}
.cb.on{background:rgba(196,88,26,.14);border-color:var(--acc);color:var(--acc);font-weight:600}

/* ---- DISH ART (illustrated placeholder since no image-gen tool available) ---- */
function dishArt(cat, seed, h){
  var art = CATEGORY_ART[cat] || CATEGORY_ART["Rice & Carbs"];
  var rot = ((seed % 5) - 2) * 6;
  var bg = "radial-gradient(circle at 30% 30%," + art.c1 + "22 0%, " + art.c2 + " 70%)";
  return '<div class="dish-art" style="height:' + h + 'px;background:' + bg + '">'
    + '<div class="dish-blob" style="width:60%;height:60%;top:-10%;left:-10%;background:' + art.c1 + '"></div>'
    + '<div class="dish-blob" style="width:45%;height:45%;bottom:-8%;right:-8%;background:' + art.c3 + '"></div>'
    + '<div class="dish-shine"></div>'
    + '<i class="ti ' + art.ico + ' dish-ico" style="font-size:' + Math.round(h*0.38) + 'px;color:rgba(255,255,255,.55);transform:rotate(' + rot + 'deg)"></i>'
    + '</div>';
}

function render(){
  var root = document.getElementById("root");
  if (S.page === "landing"){
    root.innerHTML = landingHTML();
    initLanding();
  } else if (S.page === "order"){
    root.innerHTML = '<div class="app-wrap">' + orderNav() + orderBody() + '</div>';
  } else if (S.page === "owner"){
    root.innerHTML = '<div class="app-wrap">' + ownerNav() + ownerBody() + '</div>';
  }
}

function initLanding(){
  var hamBtn = document.getElementById("hamBtn");
  var mobMenu = document.getElementById("mobMenu");
  var mobClose = document.getElementById("mobClose");
  if (hamBtn) hamBtn.onclick = function(){ mobMenu.classList.add("open"); };
  if (mobClose) mobClose.onclick = function(){ mobMenu.classList.remove("open"); };
  window.addEventListener("scroll", function(){
    var pos = window.scrollY + 100;
    ["story","menu","book","footer"].forEach(function(id){
      var el = document.getElementById(id);
      var lnk = document.querySelector('a[href="#' + id + '"]');
      if (el && lnk) lnk.classList.toggle("on", pos >= el.offsetTop && pos < el.offsetTop + el.offsetHeight);
    });
  }, { passive: true });
}

function closeMob(){ var m = document.getElementById("mobMenu"); if (m) m.classList.remove("open"); }
function goLanding(){ S.page = "landing"; render(); window.scrollTo(0,0); }
function goOrder(){ S.page = "order"; S.oview = "menu"; render(); window.scrollTo(0,0); }
function goOwner(){ S.page = "owner"; S.ownerAuth = false; render(); window.scrollTo(0,0); }

/* ---- Booking form state/logic ---- */
function setEvt(btn){
  document.querySelectorAll(".ep").forEach(function(b){ b.classList.remove("on"); });
  btn.classList.add("on");
  S.evtType = btn.dataset.v;
}
function setGuest(btn){
  document.querySelectorAll(".gp").forEach(function(b){ b.classList.remove("on"); });
  btn.classList.add("on");
  S.guestRange = btn.dataset.v;
}
function toggleMCI(i){
  var el = document.getElementById("mci" + i);
  if (S.checkedMenus[i]) { delete S.checkedMenus[i]; el.classList.remove("on"); }
  else { S.checkedMenus[i] = true; el.classList.add("on"); }
}
function submitBooking(){
  var date = document.getElementById("evtDate").value;
  var city = document.getElementById("evtCity").value.trim();
  var name = document.getElementById("evtName").value.trim();
  var phone = document.getElementById("evtPhone").value.trim();
  var notes = document.getElementById("evtNotes").value.trim();
  if (!date || !city || !name){ alert("Please fill in the event date, city and your name."); return; }
  var sel = [];
  Object.keys(S.checkedMenus).forEach(function(i){ sel.push(MENU_OPTIONS[i].n); });
  var menuStr = sel.length > 0 ? sel.join(", ") : "To be discussed";
  var d = new Date(date);
  var dateStr = d.toLocaleDateString("en-GB", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  var nl = String.fromCharCode(10);
  var msg = "Hi Ariri! I would like to book catering for an event." + nl + nl
    + "Event type: " + S.evtType + nl
    + "Date: " + dateStr + nl
    + "Guests: " + S.guestRange + nl
    + "City: " + city + nl
    + "Menu: " + menuStr + nl
    + "Name: " + name + nl
    + (phone ? "Phone: " + phone + nl : "")
    + (notes ? "Notes: " + notes + nl : "")
    + nl + "Please confirm availability. Thank you!";
  window.open("https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(msg), "_blank");

  S.bulkBookings.unshift({
    id: "#BO-" + String(100 + S.bulkBookings.length + 1),
    city: city, event: S.evtType, date: dateStr, guests: S.guestRange,
    items: menuStr, status: "pending"
  });

  document.getElementById("bookForm").style.display = "none";
  document.getElementById("formOk").style.display = "block";
}
function resetBookingForm(){
  document.getElementById("bookForm").style.display = "block";
  document.getElementById("formOk").style.display = "none";
  document.getElementById("evtDate").value = "";
  document.getElementById("evtCity").value = "";
  document.getElementById("evtName").value = "";
  document.getElementById("evtPhone").value = "";
  document.getElementById("evtNotes").value = "";
  S.checkedMenus = {};
  document.querySelectorAll(".mci").forEach(function(el){ el.classList.remove("on"); });
  document.querySelectorAll(".ep").forEach(function(b,i){ b.classList.toggle("on", i===0); });
  document.querySelectorAll(".gp").forEach(function(b,i){ b.classList.toggle("on", i===0); });
  S.evtType = "Birthday party"; S.guestRange = "20-50";
}

    + '<div class="bulk-banner"><div style="display:flex;align-items:center;gap:9px;margin-bottom:.4rem"><i class="ti ti-truck" style="font-size:18px;color:#C4581A"></i><span style="font-size:12px;font-weight:700;color:var(--txt);text-transform:uppercase;letter-spacing:.04em">Bulk &amp; City Delivery</span></div>'
    + '<p style="font-size:11px;color:rgba(232,221,208,.45);line-height:1.65;margin-bottom:.65rem">Large orders delivered to Birmingham, London, Manchester and more. Weddings, parties, corporate events.</p>'
    + '<button class="ba" onclick="oGo(\'bulk\')" style="font-size:11px;padding:6px 13px"><i class="ti ti-users"></i> Place bulk order</button></div>';
}
function setCat(c){ S.cat = c; render(); }

function openItem(id){
  var it = itm(id);
  if (!it || !it.avail) return;
  S.selId = id; S.custRm = {}; S.custAo = {}; S.custQty = 1;
  S.oview = "item"; render();
}

function orderItemV(){
  var it = itm(S.selId);
  if (!it) return orderMenuV();
  var aoT = 0;
  it.ao.forEach(function(a){ if (S.custAo[a.n]) aoT += a.p; });
  var line = (it.p + aoT) * S.custQty;
  var rmHtml = it.rm.map(function(r){
    var id = "rm" + esc(r);
    return '<div class="trow"><input type="checkbox" id="' + id + '" onchange="toggleRm(\'' + r + '\',this.checked)"><label for="' + id + '">Remove ' + r + '</label></div>';
  }).join("");
  var aoHtml = it.ao.map(function(a){
    var id = "ao" + esc(a.n);
    return '<div class="arow"><input type="checkbox" id="' + id + '" onchange="toggleAo(\'' + a.n + '\',' + a.p + ',this.checked)"><label for="' + id + '">' + a.n + '</label><span class="arow-p">+' + f(a.p) + '</span></div>';
  }).join("");
  return '<div class="panel">'
    + '<div class="ph"><span class="pt">' + it.n + '</span><button class="xb" onclick="oGo(\'menu\')"><i class="ti ti-x"></i></button></div>'
    + '<div class="pimg">' + dishArt(it.cat, it.id, 130) + '</div>'
    + '<p style="font-size:12px;color:rgba(232,221,208,.45);margin-bottom:1rem;line-height:1.6">' + it.d + ' &middot; <strong style="color:var(--acc2)">' + f(it.p) + '</strong></p>'
    + (it.rm.length ? '<div class="sec"><span class="sl">Remove ingredients</span>' + rmHtml + '</div>' : '')
    + (it.ao.length ? '<div class="sec"><span class="sl">Add extras</span>' + aoHtml + '</div>' : '')
    + '<div class="sec"><span class="sl">Special requests</span><textarea class="inp" id="itemNotes" placeholder="Allergies, spice level, extra sauce..."></textarea></div>'
    + '<div class="sec"><span class="sl">Quantity</span><div class="qrow"><button class="qb" onclick="changeQty(-1)">&#8722;</button><span class="qv">' + S.custQty + '</span><button class="qb" onclick="changeQty(1)">+</button></div></div>'
    + '<div class="divider"></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem"><span style="font-size:12px;color:rgba(232,221,208,.4)">Item total</span><span style="font-size:17px;font-weight:700;color:var(--acc2)">' + f(line) + '</span></div>'
    + '<button class="ba" style="width:100%;justify-content:center" onclick="addToCart()"><i class="ti ti-shopping-cart"></i> Add to order</button>'
  + '</div>';
}
function toggleRm(r, checked){ S.custRm[r] = checked; }
function toggleAo(n, p, checked){ if (checked) S.custAo[n] = { n: n, p: p }; else delete S.custAo[n]; }
function changeQty(d){ S.custQty = Math.max(1, S.custQty + d); render(); }

function addToCart(){
  var it = itm(S.selId);
  var notesEl = document.getElementById("itemNotes");
  var notes = notesEl ? notesEl.value : "";
  var rm = [];
  Object.keys(S.custRm).forEach(function(k){ if (S.custRm[k]) rm.push(k); });
  var ao = [];
  Object.keys(S.custAo).forEach(function(k){ ao.push(S.custAo[k]); });
  var aoT = 0; ao.forEach(function(a){ aoT += a.p; });
  S.cart.push({ id: Date.now(), name: it.n, qty: S.custQty, rm: rm, ao: ao, notes: notes, total: (it.p + aoT) * S.custQty });
  S.oview = "cart"; render();
}

function orderCartV(){
  if (S.cart.length === 0){
    return '<div class="panel"><div class="ph"><span class="pt">Your order</span><button class="xb" onclick="oGo(\'menu\')"><i class="ti ti-arrow-left"></i></button></div>'
      + '<div style="text-align:center;padding:2rem 0;color:rgba(232,221,208,.35)"><i class="ti ti-shopping-cart" style="font-size:38px;opacity:.18;display:block;margin-bottom:.75rem"></i><p style="font-size:12px">Your order is empty</p><button class="bo2" onclick="oGo(\'menu\')" style="margin-top:1rem;font-size:11px">Browse menu</button></div></div>';
  }
  var rows = S.cart.map(function(ci){
    var mods = [];
    if (ci.rm.length) mods.push("Without: " + ci.rm.join(", "));
    if (ci.ao.length) mods.push("+ " + ci.ao.map(function(a){ return a.n; }).join(", "));
    if (ci.notes) mods.push("Note: " + ci.notes);
    return '<div class="ci"><div class="ci-inf"><div class="ci-name">' + ci.qty + '&times; ' + ci.name + '</div><div class="ci-mod">' + (mods.join(" | ") || "No modifications") + '</div></div><span class="ci-price">' + f(ci.total) + '</span><button class="xb" onclick="removeFromCart(' + ci.id + ')" style="font-size:14px"><i class="ti ti-trash"></i></button></div>';
  }).join("");
  return '<div class="panel"><div class="ph"><span class="pt">Your order</span><button class="xb" onclick="oGo(\'menu\')"><i class="ti ti-arrow-left"></i></button></div>'
    + rows
    + '<div class="tot"><span>Total</span><span>' + f(cTotal()) + '</span></div>'
    + '<button class="ba" style="width:100%;justify-content:center;margin-top:.9rem" onclick="oGo(\'checkout\')"><i class="ti ti-credit-card"></i> Proceed to checkout</button>'
    + '<button class="bo2" style="width:100%;justify-content:center;margin-top:7px;font-size:11px" onclick="oGo(\'menu\')"><i class="ti ti-plus"></i> Add more items</button>'
  + '</div>';
}
function removeFromCart(id){ S.cart = S.cart.filter(function(c){ return c.id !== id; }); render(); }

function orderCheckV(){
  if (S.checkStep === "pay") return orderPayV();
  var svc = cTotal() * 0.1;
  var rows = S.cart.map(function(ci){
    return '<div class="ci"><div class="ci-inf"><div class="ci-name">' + ci.qty + '&times; ' + ci.name + '</div></div><span class="ci-price">' + f(ci.total) + '</span></div>';
  }).join("");
  return '<div class="panel"><div class="ph"><span class="pt">Checkout</span><button class="xb" onclick="oGo(\'cart\')"><i class="ti ti-arrow-left"></i></button></div>'
    + '<div class="sec"><span class="sl">Order type</span><div class="ot-row">'
    + '<div class="ot' + (S.orderType === "dine-in" ? " sel" : "") + '" onclick="setOrderType(\'dine-in\')"><i class="ti ti-building-store"></i><div class="ot-name">Dine in</div><div class="ot-sub">Eat at Ariri</div></div>'
    + '<div class="ot' + (S.orderType === "collection" ? " sel" : "") + '" onclick="setOrderType(\'collection\')"><i class="ti ti-package"></i><div class="ot-name">Collection</div><div class="ot-sub">Pick up yourself</div></div>'
    + '<div class="ot' + (S.orderType === "bulk" ? " sel" : "") + '" onclick="setOrderType(\'bulk\')"><i class="ti ti-truck"></i><div class="ot-name">Bulk delivery</div><div class="ot-sub">City delivery</div></div>'
    + '</div></div>'
    + rows
    + '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:11px;color:rgba(232,221,208,.35);border-top:1px solid rgba(232,221,208,.07);margin-top:4px"><span>Service (10%)</span><span>' + f(svc) + '</span></div>'
    + '<div class="tot"><span>Total</span><span>' + f(cTotal() + svc) + '</span></div>'
    + (S.orderType === "bulk"
        ? '<button class="ba" style="width:100%;justify-content:center;margin-top:.9rem" onclick="oGo(\'bulk\')"><i class="ti ti-truck"></i> Fill bulk delivery details</button>'
        : '<button class="ba" style="width:100%;justify-content:center;margin-top:.9rem" onclick="goPay()"><i class="ti ti-credit-card"></i> Continue to payment</button>')
  + '</div>';
}
function setOrderType(t){ S.orderType = t; render(); }
function goPay(){ S.checkStep = "pay"; render(); }

function orderPayV(){
  var tot = f(cTotal() * 1.1);
  var methods = [
    { v: "apple", n: "Apple Pay", s: "Touch ID or Face ID", ico: "ti-brand-apple" },
    { v: "google", n: "Google Pay", s: "Quick and secure", ico: "ti-brand-google" },
    { v: "card", n: "Credit / Debit Card", s: "Visa, Mastercard, Amex", ico: "ti-credit-card" }
  ];
  var methodsHtml = methods.map(function(m){
    return '<div class="po' + (S.payMethod === m.v ? " sel" : "") + '" onclick="setPayMethod(\'' + m.v + '\')">'
      + '<i class="ti ' + m.ico + ' po-ico"></i><div><div class="po-name">' + m.n + '</div><div class="po-sub">' + m.s + '</div></div>'
      + (S.payMethod === m.v ? '<i class="ti ti-circle-check" style="margin-left:auto;color:var(--acc)"></i>' : '')
    + '</div>';
  }).join("");
  var cardFields = S.payMethod === "card"
    ? '<div style="margin-top:.9rem;display:flex;flex-direction:column;gap:7px"><input class="inp" placeholder="Card number"><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px"><input class="inp" placeholder="MM / YY"><input class="inp" placeholder="CVV"></div></div>'
    : "";
  var payBtn = S.payMethod
    ? '<button class="apbtn" onclick="placeOrder()"><i class="ti ' + (S.payMethod === "apple" ? "ti-brand-apple" : S.payMethod === "google" ? "ti-brand-google" : "ti-lock") + '"></i>' + (S.payMethod === "apple" ? "Pay with Apple Pay" : S.payMethod === "google" ? "Pay with Google Pay" : "Pay now - " + tot) + '</button>'
    : '<p style="font-size:11px;color:rgba(232,221,208,.3);margin-top:.9rem;text-align:center">Select a payment method above</p>';
  return '<div class="panel"><div class="ph"><span class="pt">Payment</span><button class="xb" onclick="backToReview()"><i class="ti ti-arrow-left"></i></button></div>'
    + '<p style="font-size:12px;color:rgba(232,221,208,.4);margin-bottom:1rem">Total: <strong style="color:var(--acc2)">' + tot + '</strong></p>'
    + methodsHtml + cardFields + payBtn
  + '</div>';
}
function setPayMethod(m){ S.payMethod = m; render(); }
function backToReview(){ S.checkStep = "review"; render(); }
function placeOrder(){ S.oview = "done"; S.cart = []; S.payMethod = null; render(); }

function orderBulkV(){
  var events = ["Party","Wedding","Corporate","Funeral","Other"];
  var evtHtml = events.map(function(e){
    return '<button class="etag' + (S.evtType.toLowerCase() === e.toLowerCase() ? " on" : "") + '" onclick="setBulkEvt(\'' + e + '\')">' + e + '</button>';
  }).join("");
  return '<div class="panel"><div class="ph"><span class="pt">Bulk &amp; City Delivery</span><button class="xb" onclick="oGo(\'menu\')"><i class="ti ti-x"></i></button></div>'
    + '<p style="font-size:11px;color:rgba(232,221,208,.4);margin-bottom:1.1rem;line-height:1.7">We deliver large orders to cities across the UK. Fill in your details and we will confirm via WhatsApp on <strong style="color:var(--acc2)">+44 7405 251346</strong>.</p>'
    + '<div class="sec"><span class="sl">Delivery city</span><input class="inp" id="bcity" placeholder="e.g. Birmingham, London, Manchester..." style="margin-top:4px"></div>'
    + '<div class="sec" style="margin-top:.75rem"><span class="sl">Event type</span><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">' + evtHtml + '</div></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:.75rem">'
    + '<div><span class="sl">Event date</span><input class="inp" id="bdate" type="date" style="margin-top:4px"></div>'
    + '<div><span class="sl">No. of guests</span><input class="inp" id="bguests" type="number" placeholder="e.g. 100" style="margin-top:4px"></div></div>'
    + '<div class="sec" style="margin-top:.75rem"><span class="sl">Dishes and quantities needed</span><textarea class="inp" id="bnotes" placeholder="e.g. Party Jollof x3 trays, Egusi x2, Pounded Yam x5..." style="margin-top:4px"></textarea></div>'
    + '<div class="divider"></div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="bwa" onclick="submitBulkOrder()"><i class="ti ti-brand-whatsapp"></i> Send via WhatsApp</button></div>'
  + '</div>';
}
function setBulkEvt(e){ S.evtType = e; render(); }
function submitBulkOrder(){
  var city = document.getElementById("bcity").value.trim();
  var date = document.getElementById("bdate").value;
  var guests = document.getElementById("bguests").value.trim();
  var notes = document.getElementById("bnotes").value.trim();
  if (!city){ alert("Please enter a delivery city."); return; }
  var nl = String.fromCharCode(10);
  var msg = "Hi Ariri! I would like to place a bulk order." + nl + nl
    + "Event type: " + S.evtType + nl
    + (date ? "Date: " + date + nl : "")
    + (guests ? "Guests: " + guests + nl : "")
    + "City: " + city + nl
    + (notes ? "Items needed: " + notes + nl : "")
    + nl + "Please confirm pricing and availability. Thank you!";
  window.open("https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(msg), "_blank");
  S.oview = "done"; S.cart = []; render();
}

function orderDoneV(){
  return '<div class="succ"><i class="ti ti-circle-check succ-ico"></i><div class="succ-h">Order confirmed!</div>'
    + '<p class="succ-s">Your food is being prepared. You will receive a WhatsApp confirmation from Ariri shortly.<br>Thank you for your order!</p>'
    + '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
    + '<button class="bwa" onclick="window.open(\'https://wa.me/' + WA_NUMBER + '\',\'_blank\')"><i class="ti ti-brand-whatsapp"></i> Track on WhatsApp</button>'
    + '<button class="bo2" onclick="goLanding()" style="font-size:11px"><i class="ti ti-home"></i> Back to home</button>'
  + '</div></div>';
}

/* ================= OWNER APP ================= */
function ownerNav(){
  return '<div class="anav">'
    + '<button class="abrand" onclick="goLanding()">Ariri <em>&amp;</em> Bar</button>'
    + '<div class="anav-r">'
    +   (S.ownerAuth ? '<button class="bo2" onclick="goOrder()"><i class="ti ti-shopping-cart"></i> Customer view</button>' : '')
    +   '<button class="bo2" onclick="goLanding()"><i class="ti ti-home"></i></button>'
    + '</div>'
  + '</div>';
}
function ownerBody(){
  if (!S.ownerAuth) return ownerLoginV();
  return '<div class="otabs">'
    + '<button class="otb' + (S.ownerTab === "menu" ? " on" : "") + '" onclick="setOwnerTab(\'menu\')"><i class="ti ti-tools-kitchen"></i> Menu</button>'
    + '<button class="otb' + (S.ownerTab === "bulk" ? " on" : "") + '" onclick="setOwnerTab(\'bulk\')"><i class="ti ti-truck"></i> Bulk Orders</button>'
    + '<button class="otb' + (S.ownerTab === "email" ? " on" : "") + '" onclick="setOwnerTab(\'email\')"><i class="ti ti-mail"></i> Email</button>'
  + '</div>'
  + (S.ownerTab === "menu" ? ownerMenuV() : S.ownerTab === "bulk" ? ownerBulkV() : ownerEmailV());
}
function ownerLoginV(){
  return '<div class="panel" style="max-width:320px;margin:3rem auto">'
    + '<div class="ph"><span class="pt"><i class="ti ti-lock"></i> Owner Access</span></div>'
    + '<p style="font-size:11px;color:rgba(232,221,208,.38);margin-bottom:1.1rem;line-height:1.6">Sign in to manage your menu, view bulk orders and send customer emails.</p>'
    + '<input class="inp" type="password" id="ownerPw" placeholder="Password" onkeydown="if(event.key===\'Enter\')ownerAuth()">'
    + '<p id="ownerErr" style="font-size:11px;color:#E8855A;margin-top:.4rem;display:none">Incorrect password. Hint: try owner123</p>'
    + '<button class="ba" style="width:100%;justify-content:center;margin-top:.75rem" onclick="ownerAuth()"><i class="ti ti-login"></i> Sign in</button>'
  + '</div>';
}
function ownerAuth(){
  var pw = document.getElementById("ownerPw").value;
  if (pw === "owner123"){ S.ownerAuth = true; render(); }
  else { document.getElementById("ownerErr").style.display = "block"; }
}
function setOwnerTab(t){ S.ownerTab = t; S.emailSent = false; render(); }

function ownerMenuV(){
  var live = S.menu.filter(function(m){ return m.avail; }).length;
  var html = "";
  CATS.slice(1).forEach(function(cat){
    html += '<div class="cat-h">' + cat + '</div>';
    S.menu.filter(function(m){ return m.cat === cat; }).forEach(function(m){
      var art = CATEGORY_ART[m.cat] || CATEGORY_ART["Rice & Carbs"];
      html += '<div class="mr"><div class="mr-ico" style="background:' + art.c2 + '"><i class="ti ' + art.ico + '" style="font-size:15px;color:' + art.c1 + '"></i></div>'
        + '<div class="mr-inf"><div class="mr-name">' + m.n + '</div><div class="mr-sub">' + f(m.p) + ' - <span style="color:' + (m.avail ? "#5DCE96" : "#E8855A") + ';font-weight:600">' + (m.avail ? "Live" : "Sold out") + '</span></div></div>'
        + '<label class="tsw"><input type="checkbox" ' + (m.avail ? "checked" : "") + ' onchange="toggleMenuItem(' + m.id + ',this.checked)"><span class="tsl"></span></label></div>';
    });
  });
  return '<div class="panel"><div class="ph"><span class="pt">Menu items</span><span style="font-size:11px;color:rgba(232,221,208,.35)">' + live + '/' + S.menu.length + ' live</span></div>'
    + '<p style="font-size:11px;color:rgba(232,221,208,.35);margin-bottom:1.1rem;line-height:1.6">Toggle items on or off instantly. Customers see changes in real time.</p>'
    + html
  + '</div>';
}
function toggleMenuItem(id, checked){
  S.menu = S.menu.map(function(m){ if (m.id === id) { var c = Object.assign({}, m); c.avail = checked; return c; } return m; });
  render();
}

function ownerBulkV(){
  var html = S.bulkBookings.map(function(o){
    return '<div class="boc"><div class="boc-top"><span class="boc-id">' + o.id + '</span><span class="boc-s ' + (o.status === "confirmed" ? "c" : "p") + '">' + o.status + '</span></div>'
      + '<div class="boc-city"><i class="ti ti-map-pin" style="font-size:12px;margin-right:3px"></i>' + o.city + ' - ' + o.event + '</div>'
      + '<div class="boc-det">' + o.date + ' - ' + o.guests + ' guests<br>' + o.items + '</div></div>';
  }).join("");
  return '<div class="panel"><div class="ph"><span class="pt">Bulk &amp; Event Orders</span><span style="font-size:11px;color:rgba(232,221,208,.35)">' + S.bulkBookings.length + ' orders</span></div>'
    + '<p style="font-size:11px;color:rgba(232,221,208,.35);margin-bottom:1.1rem;line-height:1.6">Incoming bulk and event bookings from the website. Contact each customer to confirm details and pricing.</p>'
    + html
    + '<button class="bwa" style="margin-top:.5rem;font-size:11px" onclick="window.open(\'https://wa.me/' + WA_NUMBER + '\',\'_blank\')"><i class="ti ti-brand-whatsapp"></i> Respond via WhatsApp</button>'
    + '<p class="owner-note">New booking form submissions from the website appear here automatically during this session.</p>'
  + '</div>';
}

function ownerEmailV(){
  var types = [{ v: "promotion", l: "Promotion" }, { v: "event", l: "Event" }, { v: "discount", l: "Discount" }, { v: "opening", l: "Hours update" }, { v: "closure", l: "Closure" }];
  var typesHtml = types.map(function(t){
    return '<button class="etag' + (S.emailType === t.v ? " on" : "") + '" onclick="setEmailType(\'' + t.v + '\')">' + t.l + '</button>';
  }).join("");
  return '<div class="panel"><div class="ph"><span class="pt">Email campaigns</span></div>'
    + '<p style="font-size:11px;color:rgba(232,221,208,.35);margin-bottom:1rem;line-height:1.6">Broadcast to all signed-up customers instantly.</p>'
    + '<div class="sec"><span class="sl">Campaign type</span><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">' + typesHtml + '</div></div>'
    + '<div class="sec" style="margin-top:.75rem"><span class="sl">Subject line</span><input class="inp" id="emailSubj" placeholder="e.g. 20% off this weekend - Ariri Restaurant and Bar" style="margin-top:4px"></div>'
    + '<div class="sec" style="margin-top:.75rem"><span class="sl">Message</span><textarea class="inp" id="emailBody" placeholder="Write your message to customers here..." style="margin-top:4px"></textarea></div>'
    + (S.emailSent
        ? '<div class="toast"><i class="ti ti-circle-check"></i> Campaign sent to all customers</div>'
        : '<button class="ba" style="margin-top:.75rem" onclick="sendEmailCampaign()"><i class="ti ti-send"></i> Send campaign</button>')
  + '</div>';
}
function setEmailType(t){ S.emailType = t; render(); }
function sendEmailCampaign(){ S.emailSent = true; render(); setTimeout(function(){ S.emailSent = false; render(); }, 3000); }

render();

</script>
</body>
</html>
